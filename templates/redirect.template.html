<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schiller Institute International Youth Movement</title>
<!-- Language detector page — GENERATED by build.js, do not edit by hand.
     Reads a remembered choice (localStorage) or navigator.language(s) and
     redirects to the matching /xx/ folder, falling back to /{{default_lang}}/.
     Kept noindex: the language pages are the canonical content. -->
<meta name="robots" content="noindex">
<link rel="canonical" href="{{origin}}/{{default_lang}}/">
{{hreflang_links}}
<meta name="theme-color" content="#0f2a1e">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<noscript><meta http-equiv="refresh" content="0; url={{default_lang}}/"></noscript>
<script>
(function () {
  var SUPPORTED = {{langs_json}};
  var lang = "";
  try { lang = localStorage.getItem("site-lang") || ""; } catch (e) {}
  if (SUPPORTED.indexOf(lang) === -1) {
    var cands = (navigator.languages && navigator.languages.length)
      ? navigator.languages
      : [navigator.language || "{{default_lang}}"];
    lang = "{{default_lang}}";
    for (var i = 0; i < cands.length; i++) {
      var primary = String(cands[i]).toLowerCase().split("-")[0];
      if (SUPPORTED.indexOf(primary) !== -1) { lang = primary; break; }
    }
  }
  location.replace(lang + "/" + location.hash);
})();
</script>
<style>
  body{font-family:Inter,-apple-system,"Segoe UI",Roboto,sans-serif;background:#0f2a1e;color:#f0eee6;
       min-height:100svh;display:grid;place-items:center;margin:0;text-align:center}
  a{color:#e8b45c;text-decoration:none;font-weight:600}
  a:hover{text-decoration:underline}
  ul{list-style:none;padding:0;display:flex;flex-wrap:wrap;gap:8px 22px;justify-content:center;max-width:560px}
  p{opacity:.75;font-size:14px}
</style>
</head>
<body>
<main>
  <p>Redirecting… / Choose your language:</p>
  <ul>
    {{plain_links}}
  </ul>
</main>
</body>
</html>
